# Ne pas committer avec de vraies valeurs.
# En production : utiliser Sealed Secrets ou External Secrets Operator.
# Pour déployer manuellement : kubectl create secret generic price-tracker-secrets \
#   --namespace price-tracker \
#   --from-literal=MONGODB_URI='mongodb://...'
apiVersion: v1
kind: Secret
metadata:
  name: price-tracker-secrets
  namespace: price-tracker
type: Opaque
stringData:
  MONGODB_URI: "mongodb://admin:CHANGEME@mongodb-host:27017/scrapper?authSource=admin"
