# Nécessite un Ingress Controller (Traefik, embarqué par défaut avec k3s).
# Remplacer REPLACE_DOMAIN.example.com par le vrai domaine (l'overlay prod
# applique le même remplacement global que pour le frontend, ce qui donne
# automatiquement "airflow.<ton-domaine>").
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airflow-webserver
  namespace: price-tracker
spec:
  ingressClassName: traefik
  rules:
    - host: airflow.REPLACE_DOMAIN.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  number: 8080
