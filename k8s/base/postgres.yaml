# Metadata DB d'Airflow.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-postgres
  namespace: price-tracker
spec:
  serviceName: airflow-postgres
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: price-tracker-secrets
                  key: AIRFLOW_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: price-tracker-secrets
                  key: AIRFLOW_DB_PASSWORD
            - name: POSTGRES_DB
              value: airflow
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: price-tracker
spec:
  selector:
    app: airflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
