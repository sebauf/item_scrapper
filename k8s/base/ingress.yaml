# Nécessite un Ingress Controller (Traefik, embarqué par défaut avec k3s).
# Remplacer REPLACE_DOMAIN.example.com par le vrai domaine.
# Pour TLS avec cert-manager, décommenter la section tls et l'annotation.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-tracker-frontend
  namespace: price-tracker
  # annotations:
  #   cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
    - host: REPLACE_DOMAIN.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: price-tracker-frontend
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - REPLACE_DOMAIN.example.com
  #     secretName: price-tracker-frontend-tls
