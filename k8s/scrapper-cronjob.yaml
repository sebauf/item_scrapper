apiVersion: batch/v1
kind: CronJob
metadata:
  name: price-tracker-scrapper
  namespace: price-tracker
spec:
  # Tous les jours à 6h UTC — ajuster selon les besoins
  schedule: "0 6 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 2 tentatives avant de déclarer le job en échec
      backoffLimit: 2
      # Timeout global du job : 2h
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scrapper
              # Remplacer YOUR_GITHUB_USERNAME par le nom d'utilisateur GitHub
              image: ghcr.io/YOUR_GITHUB_USERNAME/item_scrapper-scrapper:main
              imagePullPolicy: Always
              env:
                - name: MONGODB_URI
                  valueFrom:
                    secretKeyRef:
                      name: price-tracker-secrets
                      key: MONGODB_URI
                - name: NODE_ENV
                  value: production
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
              volumeMounts:
                # Chromium plante avec le /dev/shm par défaut (64 MB)
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi
